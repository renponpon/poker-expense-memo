name: Data Protection & Maintenance

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 0 */45 * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Supabase Keep-alive
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?id=eq.1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: resolution=merge-duplicates" \
          -d '{"id": 1, "last_ping": "now()", "status": "active"}'

      - name: Database Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
          PGPORT: ${{ secrets.SUPABASE_DB_PORT }}
          PGUSER: ${{ secrets.SUPABASE_DB_USER }}
          PGDATABASE: postgres
        run: |
          mkdir -p backups
          pg_dump -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" > backups/db_backup.sql

      - name: Commit & Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add backups/db_backup.sql
          git commit -m "Auto-backup: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push

      - name: Keep Workflow Active
        if: github.event.schedule == '0 0 */45 * *'
        run: |
          git commit --allow-empty -m "Persistence Commit: Keeping workflow alive"
          git push

      - name: Send Notification on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "【警告】バックアップ失敗"
          to: ${{ secrets.MAIL_DESTINATION }}
          from: "Poker Tax Guard"
          body: |
            エラーが発生しました。
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
